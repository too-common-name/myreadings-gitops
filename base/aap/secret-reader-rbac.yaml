apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aap-secret-reader
  namespace: myreadings-dev
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/part-of: myreadings
rules:
  - apiGroups: [""]
    resources: ["secrets", "services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aap-secret-reader
  namespace: myreadings-dev
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/part-of: myreadings
subjects:
  - kind: ServiceAccount
    name: default
    namespace: ansible-automation-platform
roleRef:
  kind: Role
  name: aap-secret-reader
  apiGroup: rbac.authorization.k8s.io
