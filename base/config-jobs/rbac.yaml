apiVersion: v1
kind: ServiceAccount
metadata:
  name: ansible-configurator
  labels:
    app.kubernetes.io/part-of: myreadings
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ansible-configurator
  labels:
    app.kubernetes.io/part-of: myreadings
rules:
  - apiGroups: [""]
    resources: ["secrets", "services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ansible-configurator
  labels:
    app.kubernetes.io/part-of: myreadings
subjects:
  - kind: ServiceAccount
    name: ansible-configurator
roleRef:
  kind: Role
  name: ansible-configurator
  apiGroup: rbac.authorization.k8s.io
