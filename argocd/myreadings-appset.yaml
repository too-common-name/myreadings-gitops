apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: myreadings-dev
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  generators:
    - matrix:
        generators:
          - clusterDecisionResource:
              configMapRef: acm-placement
              labelSelector:
                matchLabels:
                  cluster.open-cluster-management.io/placement: dev-placement
              requeueAfterSeconds: 180
          - list:
              elements:
                - env: dev
  template:
    metadata:
      name: 'myreadings-{{env}}-{{name}}'
      labels:
        app.kubernetes.io/part-of: myreadings
        environment: '{{env}}'
    spec:
      project: myreadings
      source:
        repoURL: https://github.com/too-common-name/myreadings-gitops.git
        targetRevision: HEAD
        path: 'overlays/{{env}}'
      destination:
        server: '{{server}}'
        namespace: 'myreadings-{{env}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - SkipDryRunOnMissingResource=true
