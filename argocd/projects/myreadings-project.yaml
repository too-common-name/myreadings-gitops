apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: myreadings
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Application project for MyReadings workloads"

  sourceRepos:
    - https://github.com/too-common-name/myreadings-gitops.git

  destinations:
    - namespace: "myreadings-*"
      server: "*"

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding

  namespaceResourceWhitelist:
    - group: ""
      kind: "*"
    - group: apps
      kind: Deployment
    - group: batch
      kind: Job
    - group: route.openshift.io
      kind: Route
    - group: postgres-operator.crunchydata.com
      kind: PostgresCluster
    - group: k8s.keycloak.org
      kind: Keycloak
    - group: rabbitmq.com
      kind: RabbitmqCluster
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: tekton.dev
      kind: Task
    - group: tekton.dev
      kind: Pipeline
    - group: triggers.tekton.dev
      kind: EventListener
    - group: triggers.tekton.dev
      kind: TriggerBinding
    - group: triggers.tekton.dev
      kind: TriggerTemplate
    - group: security.istio.io
      kind: PeerAuthentication
    - group: security.istio.io
      kind: AuthorizationPolicy
    - group: networking.istio.io
      kind: VirtualService
    - group: networking.istio.io
      kind: DestinationRule

  roles:
    - name: myreadings-deployer
      description: "Sync permissions for MyReadings deployments"
      policies:
        - p, proj:myreadings:myreadings-deployer, applications, get, myreadings/*, allow
        - p, proj:myreadings:myreadings-deployer, applications, sync, myreadings/*, allow
      groups:
        - cluster-admins
