apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: myreadings-platform
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Platform project for MyReadings ACM policies and infrastructure"

  sourceRepos:
    - https://github.com/too-common-name/myreadings-gitops.git

  destinations:
    - namespace: acm-policies
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: policy.open-cluster-management.io
      kind: Policy
    - group: policy.open-cluster-management.io
      kind: PlacementBinding
    - group: cluster.open-cluster-management.io
      kind: Placement

  roles:
    - name: platform-admin
      description: "Full access to MyReadings platform resources"
      policies:
        - p, proj:myreadings-platform:platform-admin, applications, *, myreadings-platform/*, allow
      groups:
        - cluster-admins
