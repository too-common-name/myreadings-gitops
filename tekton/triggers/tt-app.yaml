apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: myreadings-app-trigger
  labels:
    app.kubernetes.io/part-of: myreadings
spec:
  params:
    - name: git-url
    - name: git-revision
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: myreadings-app-
        labels:
          app.kubernetes.io/part-of: myreadings
          tekton.dev/pipeline: myreadings-maven-build
      spec:
        pipelineRef:
          name: myreadings-maven-build
        serviceAccountName: myreadings-pipeline
        params:
          - name: git-url
            value: $(tt.params.git-url)
          - name: git-revision
            value: $(tt.params.git-revision)
          - name: dockerfile-path
            value: application/src/main/docker/Dockerfile
          - name: context-dir
            value: "."
          - name: image-name
            value: myreadings-app
          - name: image-base-ref
            value: quay.io/too-common-name/myreadings-app
          - name: overlay-path
            value: overlays/dev
        workspaces:
          - name: source
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
          - name: git-credentials
            secret:
              secretName: github-token
          - name: maven-settings
            secret:
              secretName: maven-settings
