apiVersion: v1
kind: ServiceAccount
metadata:
  name: myreadings-pipeline
  labels:
    app.kubernetes.io/part-of: myreadings
secrets:
  - name: github-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: myreadings-pipeline-image-builder
  labels:
    app.kubernetes.io/part-of: myreadings
subjects:
  - kind: ServiceAccount
    name: myreadings-pipeline
roleRef:
  kind: ClusterRole
  name: system:image-builder
  apiGroup: rbac.authorization.k8s.io
