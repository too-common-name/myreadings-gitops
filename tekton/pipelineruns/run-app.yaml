apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: myreadings-app-
  labels:
    app.kubernetes.io/part-of: myreadings
    tekton.dev/pipeline: myreadings-build
spec:
  pipelineRef:
    name: myreadings-build
  serviceAccountName: myreadings-pipeline
  params:
    - name: git-url
      value: https://github.com/too-common-name/myreadings.git
    - name: git-revision
      value: refactored
    - name: dockerfile-path
      value: application/src/main/docker/Dockerfile
    - name: context-dir
      value: "."
    - name: image-name
      value: myreadings-app
    - name: image-base-ref
      value: quay.io/too-common-name/myreadings-app
    - name: overlay-path
      value: overlays/dev
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
    - name: git-credentials
      secret:
        secretName: github-token
